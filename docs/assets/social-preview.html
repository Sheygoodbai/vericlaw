<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1200, initial-scale=1" />
    <title>VeriClaw Social Preview</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-0: #08111f;
        --bg-1: #0a1c31;
        --bg-2: #0a121b;
        --line: rgba(76, 135, 190, 0.36);
        --pill: rgba(12, 26, 42, 0.88);
        --text: #f4f8ff;
        --muted: #d1dff0;
        --soft: #92aac2;
        --cyan: #7ad8ff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 1200px;
        height: 630px;
        overflow: hidden;
        background:
          radial-gradient(circle at 76% 18%, rgba(110, 216, 255, 0.22), transparent 30%),
          radial-gradient(circle at 92% 82%, rgba(102, 239, 206, 0.18), transparent 24%),
          radial-gradient(circle at 20% 88%, rgba(68, 195, 255, 0.12), transparent 28%),
          linear-gradient(120deg, var(--bg-0), var(--bg-1) 58%, var(--bg-2));
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      }

      .frame {
        position: relative;
        width: 1200px;
        height: 630px;
        overflow: hidden;
      }

      .copy {
        position: absolute;
        left: 64px;
        top: 64px;
        width: 560px;
        color: var(--text);
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        height: 42px;
        padding: 0 18px;
        border-radius: 999px;
        border: 1px solid rgba(82, 148, 212, 0.62);
        background: rgba(13, 29, 48, 0.72);
        color: #b6e3ff;
        font-size: 16px;
        font-weight: 650;
        letter-spacing: -0.02em;
      }

      h1 {
        margin: 22px 0 0;
        font-size: 88px;
        line-height: 0.92;
        letter-spacing: -0.06em;
      }

      .subtitle {
        margin-top: 22px;
        color: #bee7ff;
        font-size: 32px;
        font-weight: 650;
        letter-spacing: -0.03em;
      }

      .body {
        margin-top: 24px;
        max-width: 500px;
        color: var(--muted);
        font-size: 23px;
        line-height: 1.34;
        letter-spacing: -0.025em;
      }

      .stage {
        position: absolute;
        right: 34px;
        top: 24px;
        width: 494px;
        height: 582px;
      }

      .halo {
        position: absolute;
        left: 106px;
        top: 104px;
        width: 292px;
        height: 292px;
        border-radius: 64px;
        background:
          radial-gradient(circle at 40% 35%, rgba(245, 232, 210, 0.58), rgba(190, 204, 221, 0.18) 52%, transparent 74%);
        filter: blur(18px);
      }

      .phone {
        position: absolute;
        right: 40px;
        top: 48px;
        width: 176px;
        padding: 8px;
        border-radius: 38px;
        background: rgba(8, 19, 32, 0.92);
        border: 1px solid rgba(82, 139, 193, 0.44);
        box-shadow: 0 26px 56px rgba(4, 9, 18, 0.56);
        transform: rotate(11deg);
      }

      .phone img {
        display: block;
        width: 100%;
        border-radius: 28px;
      }

      .icon-wrap {
        position: absolute;
        left: 96px;
        top: 108px;
        width: 292px;
        height: 292px;
        border-radius: 72px;
        box-shadow: 0 38px 82px rgba(2, 8, 18, 0.54);
      }

      .icon-wrap img {
        display: block;
        width: 100%;
        height: 100%;
        border-radius: 72px;
      }

      .callout {
        position: absolute;
        left: 66px;
        bottom: 62px;
        width: 356px;
        padding: 18px 22px 20px;
        border-radius: 26px;
        background: var(--pill);
        border: 1px solid var(--line);
        box-shadow: 0 24px 52px rgba(3, 8, 16, 0.36);
      }

      .callout strong {
        display: block;
        color: var(--cyan);
        font-size: 16px;
        letter-spacing: -0.02em;
      }

      .callout span {
        display: block;
        margin-top: 6px;
        color: #dce8f5;
        font-size: 22px;
        font-weight: 650;
        letter-spacing: -0.03em;
      }

      .foot {
        position: absolute;
        left: 64px;
        bottom: 58px;
        color: var(--soft);
        font-size: 15px;
        letter-spacing: -0.02em;
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <section class="copy">
        <div class="eyebrow">Apple-native correction companion</div>
        <h1>VeriClaw 爪印</h1>
        <div class="subtitle">Evidence / Diagnose / Correct</div>
        <div class="body">
          Native supervision for OpenClaw.<br />
          Catch drift before it compounds.
        </div>
      </section>

      <div class="foot">sheygoodbai.github.io/vericlaw</div>

      <section class="stage">
        <div class="halo"></div>
        <div class="phone">
          <img src="./screenshots/03-role-aware-followup.png" alt="" />
        </div>
        <div class="icon-wrap">
          <img src="./branding/vericlaw-brand-mark.png" alt="" />
        </div>
        <div class="callout">
          <strong>OpenClaw companion</strong>
          <span>Native correction surface</span>
        </div>
      </section>
    </div>
  </body>
</html>
